# =============================================================================
# pump_monitor.yaml — YAML-mode Lovelace dashboard (plan §10)
#
# CORE CARDS ONLY. Renders on a stock HA install with no HACS/custom cards.
# ApexCharts enhancements are documented in the README, never required here.
#
# Views:
#   Overview  — both pumps at a glance: composite status + safety row
#   Sump      — full per-pump detail (§10 panels 1-11)
#   Ejector   — full per-pump detail
#   Remote    — compact wall/ESP panel: "is everything OK right now"
# =============================================================================
title: Pump Monitor
views:
  # ===========================================================================
  # OVERVIEW
  # ===========================================================================
  - title: Overview
    path: overview
    icon: mdi:water-pump
    cards:
      - type: markdown
        content: >
          # Pump Monitor

          **Sump:** {{ states('sensor.sump_status') | upper }} —
          {{ state_attr('sensor.sump_status', 'reason') }}

          **Ejector:** {{ states('sensor.ejector_status') | upper }} —
          {{ state_attr('sensor.ejector_status', 'reason') }}

      - type: horizontal-stack
        cards:
          - type: entities
            title: Sump safety
            entities:
              - entity: binary_sensor.0x282c02bfffefb418_water_leak
                name: Flood sensor
              - entity: binary_sensor.sump_protection_compromised
                name: Protection compromised
              - entity: binary_sensor.sump_flood_sensor_fault
                name: Flood sensor fault
              - entity: sensor.0x282c02bfffefb418_battery
                name: Flood sensor battery
          - type: entities
            title: Ejector safety
            entities:
              - entity: binary_sensor.water_b3eb_water_leak
                name: Flood sensor
              - entity: binary_sensor.ejector_protection_compromised
                name: Protection compromised
              - entity: binary_sensor.ejector_flood_sensor_fault
                name: Flood sensor fault
              - entity: sensor.water_b3eb_battery
                name: Flood sensor battery

      - type: horizontal-stack
        cards:
          - type: glance
            title: Sump
            entities:
              - entity: binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running
                name: Running
              - entity: sensor.sump_time_since_last_run
                name: Since last run
              - entity: sensor.sump_runs_24h
                name: Runs 24h
              - entity: sensor.sump_duty_cycle_24h
                name: Duty 24h
          - type: glance
            title: Ejector
            entities:
              - entity: binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running
                name: Running
              - entity: sensor.ejector_time_since_last_run
                name: Since last run
              - entity: sensor.ejector_runs_24h
                name: Runs 24h
              - entity: sensor.ejector_duty_cycle_24h
                name: Duty 24h

  # ===========================================================================
  # SUMP
  # ===========================================================================
  - title: Sump
    path: sump
    icon: mdi:water-well
    cards:
      # 1. composite health tile
      - type: markdown
        content: >
          ## Sump — {{ states('sensor.sump_status') | upper }}

          {{ state_attr('sensor.sump_status', 'reason') }}

      # 2. safety row (above operational data)
      - type: entities
        title: Safety
        entities:
          - entity: binary_sensor.0x282c02bfffefb418_water_leak
            name: Flood sensor (above rim)
          - entity: binary_sensor.sump_running_but_flooding
            name: Running but flooding
          - entity: binary_sensor.sump_protection_compromised
            name: Protection compromised
          - entity: binary_sensor.sump_flood_sensor_fault
            name: Flood sensor fault
          - entity: sensor.0x282c02bfffefb418_battery
            name: Flood sensor battery

      # 3. status row — live current gauge + state glance
      - type: horizontal-stack
        cards:
          - type: gauge
            name: Live current
            entity: sensor.energy_meter_eth_ws_f3a598_ct2_amps
            unit: A
            needle: true
            severity:
              green: 0
              yellow: 8
              red: 12
          - type: glance
            entities:
              - entity: binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running
                name: Running
              - entity: sensor.sump_time_since_last_run
                name: Since last run
              - entity: sensor.sump_runs_24h
                name: Runs 24h
              - entity: sensor.sump_duty_cycle_24h
                name: Duty 24h

      # 4. state + current history (shared time axis)
      - type: history-graph
        title: State & current
        hours_to_show: 24
        entities:
          - binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running
          - sensor.energy_meter_eth_ws_f3a598_ct2_amps

      # 5. time between runs — recent vs typical
      - type: horizontal-stack
        cards:
          - type: history-graph
            title: Interval between starts
            hours_to_show: 168
            entities:
              - sensor.sump_interval_between_starts
          - type: entities
            title: Cadence baselines
            entities:
              - entity: sensor.sump_interval_between_starts
                name: Most recent interval
              - entity: sensor.sump_interval_median_14d
                name: Median (14d)
              - entity: sensor.sump_interval_p05_14d
                name: P05 (14d)
              - entity: sensor.sump_interval_mean
                name: Mean (14d)

      # 6. idle gap & inflow index — storm signature available today
      - type: history-graph
        title: Idle gap & inflow index
        hours_to_show: 168
        entities:
          - sensor.sump_idle_gap
          - sensor.sump_inflow_index

      # 7. run duration over time (+ mean/stddev numbers; core can't draw bands)
      - type: horizontal-stack
        cards:
          - type: statistics-graph
            title: Run duration
            period: hour
            chart_type: line
            stat_types:
              - mean
              - min
              - max
            entities:
              - sensor.sump_last_run_duration
          - type: entities
            title: Duration baseline
            entities:
              - entity: sensor.sump_last_run_duration
                name: Last run
              - entity: sensor.sump_duration_mean
                name: Mean (14d)
              - entity: sensor.sump_duration_stddev
                name: Stddev (14d)

      # 8. current baseline panel — wear trend
      - type: horizontal-stack
        cards:
          - type: history-graph
            title: Current baseline (wear trend)
            hours_to_show: 720
            entities:
              - sensor.sump_current_short_7d
              - sensor.sump_current_baseline_30d
          - type: entities
            title: Current
            entities:
              - entity: sensor.sump_run_peak_current
                name: Last run peak
              - entity: sensor.sump_current_short_7d
                name: Avg (7d)
              - entity: sensor.sump_current_baseline_30d
                name: Baseline (30d)
              - entity: sensor.sump_current_stddev_30d
                name: Stddev (30d)

      # 9. lifetime / wear
      - type: entities
        title: Lifetime & wear
        entities:
          - entity: counter.sump_lifetime_cycles
            name: Lifetime cycles
          - entity: sensor.sump_lifetime_runtime
            name: Lifetime runtime
          - entity: sensor.sump_duty_cycle_24h
            name: Duty cycle 24h

      # 10. health badges — all Layer-3 binary sensors
      - type: entities
        title: Health badges
        entities:
          - binary_sensor.sump_continuous_run
          - binary_sensor.sump_no_run_watchdog
          - binary_sensor.sump_short_interval
          - binary_sensor.sump_short_cycling
          - binary_sensor.sump_run_duration_anomaly
          - binary_sensor.sump_current_load_high
          - binary_sensor.sump_current_load_low
          - binary_sensor.sump_current_spike
          - binary_sensor.sump_high_duty_cycle
          - binary_sensor.sump_high_frequency
          - binary_sensor.sump_sensor_unavailable

      # 11. controls — live threshold tuning
      - type: entities
        title: Controls
        entities:
          - input_boolean.sump_monitoring_enabled
          - input_boolean.sump_no_run_history_ready
          - input_number.sump_max_run_seconds
          - input_number.sump_short_interval_seconds
          - input_number.sump_short_cycle_max_starts
          - input_number.sump_duration_zscore_mult
          - input_number.sump_current_drift_pct
          - input_number.sump_current_low_pct
          - input_number.sump_current_spike_a
          - input_number.sump_high_duty_cycle_pct
          - input_number.sump_no_run_multiplier
          - input_number.sump_no_run_floor_min
          - input_number.sump_no_run_ceiling_min
      - type: entities
        title: Alert toggles
        entities:
          - input_boolean.sump_alert_flood_enabled
          - input_boolean.sump_alert_running_but_flooding_enabled
          - input_boolean.sump_alert_protection_compromised_enabled
          - input_boolean.sump_alert_continuous_run_enabled
          - input_boolean.sump_alert_no_run_enabled
          - input_boolean.sump_alert_sensor_unavailable_enabled
          - input_boolean.sump_alert_flood_sensor_fault_enabled
          - input_boolean.sump_alert_short_interval_enabled
          - input_boolean.sump_alert_short_cycle_enabled
          - input_boolean.sump_alert_duration_anomaly_enabled
          - input_boolean.sump_alert_current_load_enabled
          - input_boolean.sump_alert_duty_cycle_enabled

