  # ===========================================================================
  # REMOTE PANEL — compact "is everything OK right now" (wall/ESP panel)
  # No controls, no deep history. Plan §10 remote view.
  # ===========================================================================
  - title: Remote
    path: remote
    icon: mdi:tablet-dashboard
    cards:
      - type: markdown
        content: >
          # {{ states('sensor.sump_status') | upper }} / {{ states('sensor.ejector_status') | upper }}

          **Sump:** {{ state_attr('sensor.sump_status', 'reason') }}

          **Ejector:** {{ state_attr('sensor.ejector_status', 'reason') }}

      - type: glance
        title: Sump
        columns: 3
        entities:
          - entity: binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running
            name: Running
          - entity: sensor.energy_meter_eth_ws_f3a598_ct2_amps
            name: Current
          - entity: sensor.sump_time_since_last_run
            name: Since run
          - entity: sensor.sump_interval_between_starts
            name: Last interval
          - entity: sensor.sump_interval_median_14d
            name: Typical
          - entity: binary_sensor.0x282c02bfffefb418_water_leak
            name: Flood

      - type: glance
        title: Ejector
        columns: 3
        entities:
          - entity: binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running
            name: Running
          - entity: sensor.energy_meter_eth_ws_f3a598_ct1_amps
            name: Current
          - entity: sensor.ejector_time_since_last_run
            name: Since run
