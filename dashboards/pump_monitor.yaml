  # ===========================================================================
  # CONFIG — all thresholds + alert toggles, both pumps (moved off pump tabs)
  # ===========================================================================
  - title: Config
    path: config
    icon: mdi:tune-variant
    type: sections
    max_columns: 2
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Sump
            heading_style: title
          - type: entities
            title: Controls
            entities:
              - input_boolean.sump_monitoring_enabled
              - input_boolean.sump_no_run_history_ready
              - input_number.sump_max_run_seconds
              - input_number.sump_short_interval_seconds
              - input_number.sump_short_cycle_max_starts
              - input_number.sump_duration_zscore_mult
              - input_number.sump_current_drift_pct
              - input_number.sump_current_low_pct
              - input_number.sump_current_spike_a
              - input_number.sump_startup_ignore_s
              - input_number.sump_high_duty_cycle_pct
              - input_number.sump_high_frequency_max
              - input_number.sump_no_run_multiplier
              - input_number.sump_no_run_floor_min
              - input_number.sump_no_run_ceiling_min
          - type: entities
            title: Alert toggles
            entities:
              - input_boolean.sump_alert_flood_enabled
              - input_boolean.sump_alert_running_but_flooding_enabled
              - input_boolean.sump_alert_protection_compromised_enabled
              - input_boolean.sump_alert_continuous_run_enabled
              - input_boolean.sump_alert_no_run_enabled
              - input_boolean.sump_alert_sensor_unavailable_enabled
              - input_boolean.sump_alert_flood_sensor_fault_enabled
              - input_boolean.sump_alert_short_interval_enabled
              - input_boolean.sump_alert_short_cycle_enabled
              - input_boolean.sump_alert_duration_anomaly_enabled
              - input_boolean.sump_alert_current_load_enabled
              - input_boolean.sump_alert_duty_cycle_enabled

      - type: grid
        cards:
          - type: heading
            heading: Ejector
            heading_style: title
          - type: entities
            title: Controls
            entities:
              - input_boolean.ejector_monitoring_enabled
              - input_boolean.ejector_no_run_history_ready
              - input_number.ejector_max_run_seconds
              - input_number.ejector_short_interval_seconds
              - input_number.ejector_short_cycle_max_starts
              - input_number.ejector_duration_zscore_mult
              - input_number.ejector_current_drift_pct
              - input_number.ejector_current_low_pct
              - input_number.ejector_current_spike_a
              - input_number.ejector_startup_ignore_s
              - input_number.ejector_high_duty_cycle_pct
              - input_number.ejector_high_frequency_max
              - input_number.ejector_no_run_multiplier
              - input_number.ejector_no_run_floor_min
              - input_number.ejector_no_run_ceiling_min
          - type: entities
            title: Alert toggles
            entities:
              - input_boolean.ejector_alert_flood_enabled
              - input_boolean.ejector_alert_running_but_flooding_enabled
              - input_boolean.ejector_alert_protection_compromised_enabled
              - input_boolean.ejector_alert_continuous_run_enabled
              - input_boolean.ejector_alert_no_run_enabled
              - input_boolean.ejector_alert_sensor_unavailable_enabled
              - input_boolean.ejector_alert_flood_sensor_fault_enabled
              - input_boolean.ejector_alert_short_interval_enabled
              - input_boolean.ejector_alert_short_cycle_enabled
              - input_boolean.ejector_alert_duration_anomaly_enabled
              - input_boolean.ejector_alert_current_load_enabled
              - input_boolean.ejector_alert_duty_cycle_enabled
