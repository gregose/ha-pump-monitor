# =============================================================================
# pump_monitor_ejector.yaml  —  EJECTOR pump monitoring (Layers 1-4)
# Plan §3, §6, §6a, §6b. Build bottom-up: each layer reads only the one below.
#
# Fixed inputs (read-only, plan §2; CT mapping confirmed Task 0: ejector = CT1):
#   binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running   (running)
#   sensor.energy_meter_eth_ws_f3a598_ct1_amps                         (current)
#   binary_sensor.water_b3eb_water_leak                        (flood, above rim)
#   sensor.water_b3eb_battery                                  (flood battery)
#     ^ CONFIRMED by user (Task A). Guarded with float(100) default so a missing
#       reading never false-fires the low-battery fault.
#
# DESIGN — alert gating: Layer-3 binary sensors are PURE physical conditions
# (truthful for dashboard badges, composites, and the status tile). Because the
# `alert` integration cannot take a condition, each alert instead watches a thin
# gated wrapper `binary_sensor.ejector_*_alert` = (pure condition) AND
# monitoring_enabled AND its per-alert toggle. Plan §9.
#
# ALL templates are availability-safe: every float() has a default and source
# reads are guarded so math never errors while statistics warm up (plan §13).
# =============================================================================

# -----------------------------------------------------------------------------
# Layer 1 — per-cycle trigger template sensors + derived templates
# -----------------------------------------------------------------------------
template:
  # --- trigger: record last START time on off→on (restart-robust anchor) ------
  - trigger:
      - platform: state
        entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running
        from: "off"
        to: "on"
    sensor:
      - name: "Ejector Last Start Time"
        unique_id: pm_ejector_last_start_time
        device_class: timestamp
        state: "{{ trigger.to_state.last_changed }}"

  # --- trigger: record last STOP time on on→off -------------------------------
  - trigger:
      - platform: state
        entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running
        from: "on"
        to: "off"
    sensor:
      - name: "Ejector Last Stop Time"
        unique_id: pm_ejector_last_stop_time
        device_class: timestamp
        state: "{{ trigger.to_state.last_changed }}"

  # --- trigger: run duration on on→off ----------------------------------------
  - trigger:
      - platform: state
        entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running
        from: "on"
        to: "off"
    sensor:
      - name: "Ejector Last Run Duration"
        unique_id: pm_ejector_last_run_duration
        device_class: duration
        unit_of_measurement: "s"
        state_class: measurement
        state: >
          {{ (as_timestamp(trigger.to_state.last_changed)
              - as_timestamp(trigger.from_state.last_changed)) | round(1) }}

  # --- trigger: start-to-start interval on off→on (prev start in attribute) ---
  - trigger:
      - platform: state
        entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running
        from: "off"
        to: "on"
    sensor:
      - name: "Ejector Interval Between Starts"
        unique_id: pm_ejector_interval
        device_class: duration
        unit_of_measurement: "s"
        state_class: measurement
        state: >
          {% set prev = this.attributes.get('last_start') %}
          {{ (as_timestamp(trigger.to_state.last_changed) - as_timestamp(prev)) | round(0)
             if prev else 0 }}
        attributes:
          last_start: "{{ trigger.to_state.last_changed }}"

  # --- trigger: idle gap on off→on (prev STOP → this START = inflow proxy) -----
  - trigger:
      - platform: state
        entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running
        from: "off"
        to: "on"
    sensor:
      - name: "Ejector Idle Gap"
        unique_id: pm_ejector_idle_gap
        device_class: duration
        unit_of_measurement: "s"
        state_class: measurement
        # prev stop comes DIRECTLY from ejector_last_stop_time (set on the prior
        # on→off, so it already holds the stop preceding THIS start). Do NOT stash
        # it in a self-attribute — that lags one firing and ~doubles the gap.
        state: >
          {% set prev_stop = states('sensor.ejector_last_stop_time') %}
          {{ (as_timestamp(trigger.to_state.last_changed) - as_timestamp(prev_stop)) | round(0)
             if prev_stop not in ['unknown', 'unavailable', 'None', ''] else 0 }}

  # --- trigger: per-run peak current (start edge + every CT sample) ------------
  - trigger:
      - platform: state
        entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running
        to: "on"
        id: start
      - platform: state
        entity_id: sensor.energy_meter_eth_ws_f3a598_ct1_amps   # ejector = CT1
        id: sample
    sensor:
      - name: "Ejector Run Peak Current"
        unique_id: pm_ejector_run_peak_current
        device_class: current
        unit_of_measurement: "A"
        state_class: measurement
        state: >
          {% set cur = states('sensor.energy_meter_eth_ws_f3a598_ct1_amps') | float(0) %}
          {% if trigger.id == 'start' %}
            {{ cur }}
          {% elif is_state('binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running','on') %}
            {{ [ this.state | float(0), cur ] | max }}
          {% else %}
            {{ this.state | float(0) }}
          {% endif %}

  # --- trigger: per-run AVERAGE current (accumulate sum/count, divide on stop) -
  # One value per completed cycle → the clean per-cycle feed for the 7d/30d
  # current baselines (sourcing the raw 1 Hz stream would swamp sampling_size on
  # a fast-cycling pump and collapse the 7d/30d windows into the same few days).
  - trigger:
      - platform: state
        entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running
        to: "on"
        id: start
      - platform: state
        entity_id: sensor.energy_meter_eth_ws_f3a598_ct1_amps
        id: sample
      - platform: state
        entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running
        from: "on"
        to: "off"
        id: stop
    sensor:
      - name: "Ejector Run Avg Current"
        unique_id: pm_ejector_run_avg_current
        device_class: current
        unit_of_measurement: "A"
        state_class: measurement
        # state holds the previous run's mean until a new run completes.
        state: >
          {% if trigger.id == 'stop' %}
            {% set n = this.attributes.get('n', 0) | int %}
            {% set s = this.attributes.get('sum', 0) | float %}
            {{ (s / n) | round(2) if n > 0 else this.state | float(0) }}
          {% else %}
            {{ this.state | float(0) }}
          {% endif %}
        attributes:
          # `this` reflects pre-update attributes, so accumulation is correct.
          n: >
            {% if trigger.id == 'start' %}0
            {% elif trigger.id == 'sample' and is_state('binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running','on') %}{{ (this.attributes.get('n', 0) | int) + 1 }}
            {% else %}{{ this.attributes.get('n', 0) | int }}{% endif %}
          sum: >
            {% if trigger.id == 'start' %}0
            {% elif trigger.id == 'sample' and is_state('binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running','on') %}{{ (this.attributes.get('sum', 0) | float) + (states('sensor.energy_meter_eth_ws_f3a598_ct1_amps') | float(0)) }}
            {% else %}{{ this.attributes.get('sum', 0) | float }}{% endif %}

  # --- trigger: lifetime runtime odometer (cumulative; total_increasing) -------
  # Chosen over utility_meter: on-time isn't a monotonic source sensor, so a
  # trigger sensor that adds each completed run's duration is simpler and truly
  # cumulative. total_increasing → feeds Long-Term Statistics; survives restart.
  - trigger:
      - platform: state
        entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running
        from: "on"
        to: "off"
    sensor:
      - name: "Ejector Lifetime Runtime"
        unique_id: pm_ejector_lifetime_runtime
        device_class: duration
        unit_of_measurement: "s"
        state_class: total_increasing
        state: >
          {{ ((this.state | float(0))
              + (as_timestamp(trigger.to_state.last_changed)
                 - as_timestamp(trigger.from_state.last_changed))) | round(0) }}

  # --- regular templates ------------------------------------------------------
  - sensor:
      # passthrough of CT current ONLY while running → clean feed for baselines
      - name: "Ejector Run Current Active"
        unique_id: pm_ejector_run_current_active
        device_class: current
        unit_of_measurement: "A"
        state_class: measurement
        availability: >
          {{ is_state('binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running','on') }}
        state: "{{ states('sensor.energy_meter_eth_ws_f3a598_ct1_amps') | float(0) }}"

      # time since last start — references now() so it re-evaluates ~once a minute,
      # driving the no-run watchdog. Keyed off the stored start time (restart-robust).
      - name: "Ejector Time Since Last Run"
        unique_id: pm_ejector_time_since_last_run
        device_class: duration
        unit_of_measurement: "s"
        state: >
          {% set start = states('sensor.ejector_last_start_time') %}
          {% if start in ['unknown','unavailable','None',''] or start is none %}
            0
          {% else %}
            {{ [ (now() | as_timestamp) - (start | as_timestamp(0)), 0 ] | max | round(0) }}
          {% endif %}

      # inflow index — refills/hour ≈ 3600 / idle_gap. Storm-signature trace today.
      - name: "Ejector Inflow Index"
        unique_id: pm_ejector_inflow_index
        unit_of_measurement: "/h"
        state_class: measurement
        state: >
          {% set gap = states('sensor.ejector_idle_gap') | float(0) %}
          {{ (3600 / ([gap, 5] | max)) | round(2) }}

      # duty cycle over 24h (%) = on-time hours / 24 * 100
      - name: "Ejector Duty Cycle 24h"
        unique_id: pm_ejector_duty_cycle_24h
        unit_of_measurement: "%"
        state_class: measurement
        state: >
          {{ (states('sensor.ejector_ontime_24h') | float(0) / 24 * 100) | round(1) }}

  # (plan §6 optional) sensor.ejector_run_avg_current IS implemented above — it is
  # the per-cycle feed for the 7d/30d current baselines. sensor.ejector_run_current_active
  # is kept as the instantaneous while-running passthrough for live charting.

# -----------------------------------------------------------------------------
# Layer 3 — health / anomaly binary sensors (PURE conditions; ungated)
#   + §6b water-safety composites. Alert gating lives in the wrappers further down.
# -----------------------------------------------------------------------------
  - binary_sensor:
      - name: "Ejector Run Duration Anomaly"
        unique_id: pm_ejector_run_duration_anomaly
        device_class: problem
        state: >
          {% set d  = states('sensor.ejector_last_run_duration') | float(0) %}
          {% set m  = states('sensor.ejector_duration_mean') | float(0) %}
          {% set sd = [ states('sensor.ejector_duration_stddev') | float(0), 2 ] | max %}
          {% set z  = states('input_number.ejector_duration_zscore_mult') | float(3) %}
          {{ m > 0 and d > 0 and (d > m + z * sd or d < m - z * sd) }}

      - name: "Ejector Short Interval"
        unique_id: pm_ejector_short_interval
        device_class: problem
        # fires when latest start-to-start interval is below the higher of the
        # fixed floor and the learned 5th-percentile. Sustain is enforced by the
        # alert's `for:` hold (§9) so a lone check-valve burp doesn't page.
        state: >
          {% set iv    = states('sensor.ejector_interval_between_starts') | float(0) %}
          {% set fixed = states('input_number.ejector_short_interval_seconds') | float(30) %}
          {% set p05   = states('sensor.ejector_interval_p05_14d') | float(0) %}
          {% set floor = [ fixed, p05 ] | max %}
          {# §6a: ejector short-interval is OFF by default (no meaningful "too
             frequent" bound for household wastewater). Gated on its enable
             toggle; enable only if such a bound is established. #}
          {{ iv > 0 and iv < floor
             and is_state('input_boolean.ejector_alert_short_interval_enabled','on') }}

      - name: "Ejector Short Cycling"
        unique_id: pm_ejector_short_cycling
        device_class: problem
        # count-in-window view (stuck-float / undersized signature). Window is the
        # fixed 10-min history_stats count below; the helper documents intent.
        # To change the window, edit sensor.ejector_runs_10m's duration (seam).
        state: >
          {% set c = states('sensor.ejector_runs_10m') | float(0) %}
          {% set m = states('input_number.ejector_short_cycle_max_starts') | float(4) %}
          {{ c > m }}

      - name: "Ejector Continuous Run"
        unique_id: pm_ejector_continuous_run
        device_class: problem
        # highest-priority current-derived signal: on AND elapsed > max_run_seconds
        state: >
          {% set running = is_state('binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running','on') %}
          {% set lc = states.binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running.last_changed %}
          {% set elapsed = (now() | as_timestamp) - (lc | as_timestamp(now() | as_timestamp)) if running else 0 %}
          {% set cap = states('input_number.ejector_max_run_seconds') | float(120) %}
          {{ running and elapsed > cap }}

      - name: "Ejector Current Load High"
        unique_id: pm_ejector_current_load_high
        device_class: problem
        state: >
          {% set s7  = states('sensor.ejector_current_short_7d') | float(0) %}
          {% set b30 = states('sensor.ejector_current_baseline_30d') | float(0) %}
          {% set drift = states('input_number.ejector_current_drift_pct') | float(20) %}
          {{ b30 > 0 and s7 > b30 * (1 + drift / 100) }}

      - name: "Ejector Current Load Low"
        unique_id: pm_ejector_current_load_low
        device_class: problem
        state: >
          {% set s7  = states('sensor.ejector_current_short_7d') | float(0) %}
          {% set b30 = states('sensor.ejector_current_baseline_30d') | float(0) %}
          {% set low = states('input_number.ejector_current_low_pct') | float(60) %}
          {{ b30 > 0 and s7 > 0 and s7 < b30 * low / 100 }}

      - name: "Ejector Current Spike"
        unique_id: pm_ejector_current_spike
        device_class: problem
        # disabled until the user sets a non-zero absolute cutoff (§7)
        state: >
          {% set pk = states('sensor.ejector_run_peak_current') | float(0) %}
          {% set sp = states('input_number.ejector_current_spike_a') | float(0) %}
          {{ sp > 0 and pk > sp }}

      - name: "Ejector High Duty Cycle"
        unique_id: pm_ejector_high_duty_cycle
        device_class: problem
        state: >
          {% set dc  = states('sensor.ejector_duty_cycle_24h') | float(0) %}
          {% set lim = states('input_number.ejector_high_duty_cycle_pct') | float(50) %}
          {{ dc > lim }}

      - name: "Ejector Sensor Unavailable"
        unique_id: pm_ejector_sensor_unavailable
        device_class: problem
        delay_on: { seconds: 60 }   # debounce transient drops
        state: >
          {% set ct  = states('sensor.energy_meter_eth_ws_f3a598_ct1_amps') %}
          {% set bin = states('binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running') %}
          {{ ct in ['unknown','unavailable'] or bin in ['unknown','unavailable'] }}

      - name: "Ejector No Run Watchdog"
        unique_id: pm_ejector_no_run_watchdog
        device_class: problem
        # ADAPTIVE (plan §6). Warm-up = fixed fallback until history_ready flips;
        # steady-state = clamp(floor, ceiling, multiplier × 14d median interval).
        # Median tracks seasonal drift automatically.
        state: >
          {% set since  = states('sensor.ejector_time_since_last_run') | float(0) %}
          {% set ready  = is_state('input_boolean.ejector_no_run_history_ready','on') %}
          {% set median = states('sensor.ejector_interval_median_14d') | float(0) %}
          {% set mult   = states('input_number.ejector_no_run_multiplier') | float(3) %}
          {% set floor  = states('input_number.ejector_no_run_floor_min') | float(45) * 60 %}
          {% set ceil   = states('input_number.ejector_no_run_ceiling_min') | float(120) * 60 %}
          {% set warmup = states('input_number.ejector_no_run_warmup_fixed_min') | float(90) * 60 %}
          {% if ready and median > 0 %}
            {% set thresh = [ floor, [ ceil, mult * median ] | min ] | max %}
          {% else %}
            {% set thresh = warmup %}
          {% endif %}
          {# §6a: ejector no-run is OFF by default — long quiet stretches are
             normal (household-driven). Gated on its enable toggle so it stays
             dark and never pollutes protection_compromised unless the user opts
             in (sump keeps this watchdog ungated/always-on). #}
          {{ since > 0 and since > thresh
             and is_state('input_boolean.ejector_alert_no_run_enabled','on') }}

      - name: "Ejector High Frequency"
        unique_id: pm_ejector_high_frequency
        device_class: problem
        # built but alert OFF (superseded by short_interval; revisit Phase 2).
        # ROADMAP: replace fixed ceiling with a rain-normalized daily view.
        # Threshold is the live ejector_high_frequency_max helper (default 60).
        state: >
          {{ states('sensor.ejector_runs_24h') | float(0)
             > states('input_number.ejector_high_frequency_max') | float(60) }}

      # --- §6b water-safety layer ---------------------------------------------
      - name: "Ejector Running But Flooding"
        unique_id: pm_ejector_running_but_flooding
        device_class: problem
        state: >
          {{ is_state('binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running','on')
             and is_state('binary_sensor.water_b3eb_water_leak','on') }}

      - name: "Ejector Flood Sensor Fault"
        unique_id: pm_ejector_flood_sensor_fault
        device_class: problem
        delay_on: { seconds: 60 }
        state: >
          {% set leak = states('binary_sensor.water_b3eb_water_leak') %}
          {% set batt = states('sensor.water_b3eb_battery') | float(100) %}
          {% set lowpct = states('input_number.flood_sensor_low_battery_pct') | float(20) %}
          {{ leak in ['unknown','unavailable'] or batt < lowpct }}

      - name: "Ejector Protection Compromised"
        unique_id: pm_ejector_protection_compromised
        device_class: safety
        # composite: a primary fault is active and/or the flood sensor is wet →
        # the primary has likely failed and the battery backup is load-bearing.
        # Reads the PURE Layer-3 sensors so toggles never mask a real escalation.
        state: >
          {{ is_state('binary_sensor.ejector_no_run_watchdog','on')
             or is_state('binary_sensor.ejector_continuous_run','on')
             or is_state('binary_sensor.ejector_current_load_low','on')
             or is_state('binary_sensor.water_b3eb_water_leak','on') }}

  # --- composite status tile (truthful; ignores toggles) ----------------------
  - sensor:
      - name: "Ejector Status"
        unique_id: pm_ejector_status_ok
        icon: >
          {% set s = states('sensor.ejector_status') %}
          {{ 'mdi:alert-octagon' if s == 'critical'
             else 'mdi:alert' if s == 'warning' else 'mdi:check-circle' }}
        state: >
          {% set flood   = is_state('binary_sensor.water_b3eb_water_leak','on') %}
          {% set comp    = is_state('binary_sensor.ejector_protection_compromised','on') %}
          {% set cont    = is_state('binary_sensor.ejector_continuous_run','on') %}
          {% set norun   = is_state('binary_sensor.ejector_no_run_watchdog','on') %}
          {% set unavail = is_state('binary_sensor.ejector_sensor_unavailable','on') %}
          {% set rbf     = is_state('binary_sensor.ejector_running_but_flooding','on') %}
          {% set warns = [
               is_state('binary_sensor.ejector_run_duration_anomaly','on'),
               is_state('binary_sensor.ejector_short_interval','on'),
               is_state('binary_sensor.ejector_short_cycling','on'),
               is_state('binary_sensor.ejector_current_load_high','on'),
               is_state('binary_sensor.ejector_current_load_low','on'),
               is_state('binary_sensor.ejector_current_spike','on'),
               is_state('binary_sensor.ejector_high_duty_cycle','on'),
               is_state('binary_sensor.ejector_flood_sensor_fault','on') ] %}
          {% if flood or rbf or comp or cont or norun or unavail %}
            critical
          {% elif warns | select('==', true) | list | count > 0 %}
            warning
          {% else %}
            ok
          {% endif %}
        attributes:
          reason: >
            {% set r = namespace(items=[]) %}
            {% if is_state('binary_sensor.water_b3eb_water_leak','on') %}{% set r.items = r.items + ['FLOODING'] %}{% endif %}
            {% if is_state('binary_sensor.ejector_running_but_flooding','on') %}{% set r.items = r.items + ['running but flooding'] %}{% endif %}
            {% if is_state('binary_sensor.ejector_protection_compromised','on') %}{% set r.items = r.items + ['protection compromised'] %}{% endif %}
            {% if is_state('binary_sensor.ejector_continuous_run','on') %}{% set r.items = r.items + ['continuous run'] %}{% endif %}
            {% if is_state('binary_sensor.ejector_no_run_watchdog','on') %}{% set r.items = r.items + ['no run'] %}{% endif %}
            {% if is_state('binary_sensor.ejector_sensor_unavailable','on') %}{% set r.items = r.items + ['sensor offline'] %}{% endif %}
            {% if is_state('binary_sensor.ejector_run_duration_anomaly','on') %}{% set r.items = r.items + ['duration anomaly'] %}{% endif %}
            {% if is_state('binary_sensor.ejector_short_interval','on') %}{% set r.items = r.items + ['short interval'] %}{% endif %}
            {% if is_state('binary_sensor.ejector_short_cycling','on') %}{% set r.items = r.items + ['short cycling'] %}{% endif %}
            {% if is_state('binary_sensor.ejector_current_load_high','on') %}{% set r.items = r.items + ['current high'] %}{% endif %}
            {% if is_state('binary_sensor.ejector_current_load_low','on') %}{% set r.items = r.items + ['current low'] %}{% endif %}
            {% if is_state('binary_sensor.ejector_current_spike','on') %}{% set r.items = r.items + ['current spike'] %}{% endif %}
            {% if is_state('binary_sensor.ejector_high_duty_cycle','on') %}{% set r.items = r.items + ['high duty cycle'] %}{% endif %}
            {% if is_state('binary_sensor.ejector_flood_sensor_fault','on') %}{% set r.items = r.items + ['flood sensor fault'] %}{% endif %}
            {{ r.items | join(', ') if r.items else 'All clear' }}

  # --- gated alert-source wrappers (alert ⇐ condition AND monitoring AND toggle)
  - binary_sensor:
      - name: "Ejector Flooding Alert"
        unique_id: pm_ejector_flooding_alert
        state: >
          {{ is_state('binary_sensor.water_b3eb_water_leak','on')
             and is_state('input_boolean.ejector_monitoring_enabled','on')
             and is_state('input_boolean.ejector_alert_flood_enabled','on') }}
      - name: "Ejector Running But Flooding Alert"
        unique_id: pm_ejector_running_but_flooding_alert
        state: >
          {{ is_state('binary_sensor.ejector_running_but_flooding','on')
             and is_state('input_boolean.ejector_monitoring_enabled','on')
             and is_state('input_boolean.ejector_alert_running_but_flooding_enabled','on') }}
      - name: "Ejector Protection Compromised Alert"
        unique_id: pm_ejector_protection_compromised_alert
        state: >
          {{ is_state('binary_sensor.ejector_protection_compromised','on')
             and is_state('input_boolean.ejector_monitoring_enabled','on')
             and is_state('input_boolean.ejector_alert_protection_compromised_enabled','on') }}
      - name: "Ejector Continuous Run Alert"
        unique_id: pm_ejector_continuous_run_alert
        state: >
          {{ is_state('binary_sensor.ejector_continuous_run','on')
             and is_state('input_boolean.ejector_monitoring_enabled','on')
             and is_state('input_boolean.ejector_alert_continuous_run_enabled','on') }}
      - name: "Ejector Sensor Unavailable Alert"
        unique_id: pm_ejector_sensor_unavailable_alert
        state: >
          {{ is_state('binary_sensor.ejector_sensor_unavailable','on')
             and is_state('input_boolean.ejector_monitoring_enabled','on')
             and is_state('input_boolean.ejector_alert_sensor_unavailable_enabled','on') }}
      - name: "Ejector No Run Alert"
        unique_id: pm_ejector_no_run_alert
        state: >
          {{ is_state('binary_sensor.ejector_no_run_watchdog','on')
             and is_state('input_boolean.ejector_monitoring_enabled','on')
             and is_state('input_boolean.ejector_alert_no_run_enabled','on') }}
      - name: "Ejector Flood Sensor Fault Alert"
        unique_id: pm_ejector_flood_sensor_fault_alert
        state: >
          {{ is_state('binary_sensor.ejector_flood_sensor_fault','on')
             and is_state('input_boolean.ejector_monitoring_enabled','on')
             and is_state('input_boolean.ejector_alert_flood_sensor_fault_enabled','on') }}
      - name: "Ejector Short Interval Alert"
        unique_id: pm_ejector_short_interval_alert
        state: >
          {{ is_state('binary_sensor.ejector_short_interval','on')
             and is_state('input_boolean.ejector_monitoring_enabled','on')
             and is_state('input_boolean.ejector_alert_short_interval_enabled','on') }}
      - name: "Ejector Short Cycling Alert"
        unique_id: pm_ejector_short_cycling_alert
        state: >
          {{ is_state('binary_sensor.ejector_short_cycling','on')
             and is_state('input_boolean.ejector_monitoring_enabled','on')
             and is_state('input_boolean.ejector_alert_short_cycle_enabled','on') }}
      - name: "Ejector Duration Anomaly Alert"
        unique_id: pm_ejector_duration_anomaly_alert
        state: >
          {{ is_state('binary_sensor.ejector_run_duration_anomaly','on')
             and is_state('input_boolean.ejector_monitoring_enabled','on')
             and is_state('input_boolean.ejector_alert_duration_anomaly_enabled','on') }}
      - name: "Ejector Current Load High Alert"
        unique_id: pm_ejector_current_load_high_alert
        state: >
          {{ is_state('binary_sensor.ejector_current_load_high','on')
             and is_state('input_boolean.ejector_monitoring_enabled','on')
             and is_state('input_boolean.ejector_alert_current_load_enabled','on') }}
      - name: "Ejector Current Load Low Alert"
        unique_id: pm_ejector_current_load_low_alert
        state: >
          {{ is_state('binary_sensor.ejector_current_load_low','on')
             and is_state('input_boolean.ejector_monitoring_enabled','on')
             and is_state('input_boolean.ejector_alert_current_load_enabled','on') }}
      - name: "Ejector Current Spike Alert"
        unique_id: pm_ejector_current_spike_alert
        state: >
          {{ is_state('binary_sensor.ejector_current_spike','on')
             and is_state('input_boolean.ejector_monitoring_enabled','on')
             and is_state('input_boolean.ejector_alert_current_load_enabled','on') }}
      - name: "Ejector High Duty Cycle Alert"
        unique_id: pm_ejector_high_duty_cycle_alert
        state: >
          {{ is_state('binary_sensor.ejector_high_duty_cycle','on')
             and is_state('input_boolean.ejector_monitoring_enabled','on')
             and is_state('input_boolean.ejector_alert_duty_cycle_enabled','on') }}

# -----------------------------------------------------------------------------
# Layer 2 — aggregates: history_stats (counts/on-time) + statistics (baselines)
# -----------------------------------------------------------------------------
sensor:
  - platform: history_stats
    name: "Ejector Runs 1h"
    unique_id: pm_ejector_runs_1h
    entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running
    state: "on"
    type: count
    start: "{{ now() - timedelta(hours=1) }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: "Ejector Runs 10m"      # short-cycle window (see binary_sensor.ejector_short_cycling)
    unique_id: pm_ejector_runs_10m
    entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running
    state: "on"
    type: count
    start: "{{ now() - timedelta(minutes=10) }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: "Ejector Runs 24h"
    unique_id: pm_ejector_runs_24h
    entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running
    state: "on"
    type: count
    start: "{{ now() - timedelta(hours=24) }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: "Ejector Ontime 24h"    # duty-cycle base (hours)
    unique_id: pm_ejector_ontime_24h
    entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running
    state: "on"
    type: time
    start: "{{ now() - timedelta(hours=24) }}"
    end: "{{ now() }}"

  # --- statistics baselines (self-tuning) ------------------------------------
  - platform: statistics
    name: "Ejector Duration Mean"
    unique_id: pm_ejector_duration_mean
    entity_id: sensor.ejector_last_run_duration
    state_characteristic: mean
    sampling_size: 5000
    max_age: { days: 14 }
  - platform: statistics
    name: "Ejector Duration Stddev"
    unique_id: pm_ejector_duration_stddev
    entity_id: sensor.ejector_last_run_duration
    state_characteristic: standard_deviation   # σ-like spread; see note
    sampling_size: 5000
    max_age: { days: 14 }
  - platform: statistics
    name: "Ejector Interval Mean"
    unique_id: pm_ejector_interval_mean
    entity_id: sensor.ejector_interval_between_starts
    state_characteristic: mean
    sampling_size: 5000
    max_age: { days: 14 }
  - platform: statistics
    name: "Ejector Interval Stddev"
    unique_id: pm_ejector_interval_stddev
    entity_id: sensor.ejector_interval_between_starts
    state_characteristic: standard_deviation
    sampling_size: 5000
    max_age: { days: 14 }
  - platform: statistics
    name: "Ejector Interval Median 14d"
    unique_id: pm_ejector_interval_median_14d
    entity_id: sensor.ejector_interval_between_starts
    state_characteristic: median
    sampling_size: 5000
    max_age: { days: 14 }
  - platform: statistics
    name: "Ejector Interval P05 14d"
    unique_id: pm_ejector_interval_p05_14d
    entity_id: sensor.ejector_interval_between_starts
    state_characteristic: percentile
    percentile: 5
    sampling_size: 5000
    max_age: { days: 14 }
  - platform: statistics
    name: "Ejector Idle Gap Median 14d"
    unique_id: pm_ejector_idle_gap_median_14d
    entity_id: sensor.ejector_idle_gap
    state_characteristic: median
    sampling_size: 5000
    max_age: { days: 14 }
  # current baselines fed by the PER-RUN mean (one value/cycle) so 7d and 30d are
  # genuinely different windows even on a fast-cycling pump. sampling_size sized
  # to hold the full window at the measured cadence (~238 cycles/day).
  - platform: statistics
    name: "Ejector Current Baseline 30d"
    unique_id: pm_ejector_current_baseline_30d
    entity_id: sensor.ejector_run_avg_current
    state_characteristic: mean
    sampling_size: 8000
    max_age: { days: 30 }
  - platform: statistics
    name: "Ejector Current Short 7d"
    unique_id: pm_ejector_current_short_7d
    entity_id: sensor.ejector_run_avg_current
    state_characteristic: mean
    sampling_size: 2500
    max_age: { days: 7 }
  - platform: statistics
    name: "Ejector Current Stddev 30d"
    unique_id: pm_ejector_current_stddev_30d
    entity_id: sensor.ejector_run_avg_current
    state_characteristic: standard_deviation
    sampling_size: 8000
    max_age: { days: 30 }

# -----------------------------------------------------------------------------
# Layer 2 — lifetime cycle odometer (counter + increment automation)
#   counter (not auto-resetting) → user resets via counter.reset on pump swap.
# -----------------------------------------------------------------------------
counter:
  ejector_lifetime_cycles:
    name: "Ejector Lifetime Cycles"
    icon: mdi:counter
    step: 1

automation:
  - id: pm_ejector_increment_cycles
    alias: "Pump Monitor: increment ejector lifetime cycles"
    trigger:
      - platform: state
        entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_ejector_pump_running
        from: "on"
        to: "off"
    action:
      - service: counter.increment
        target:
          entity_id: counter.ejector_lifetime_cycles
    mode: queued

# -----------------------------------------------------------------------------
# Layer 4 — alerts (ack + re-notify). Each watches a gated wrapper above.
#   Ordered by priority; flood/safety tier outranks current-derived alerts (§9).
#   Critical tier uses iOS critical interruption sound to cut through DND.
# -----------------------------------------------------------------------------
alert:
  # ===== CRITICAL — water-safety tier (§6b) =====
  ejector_flooding:
    name: "🚨 EJECTOR FLOODING"
    entity_id: binary_sensor.ejector_flooding_alert
    state: "on"
    repeat: [1, 5]
    can_acknowledge: true
    skip_first: false
    title: "🚨 Ejector flooding"
    message: "Water detected at the EJECTOR pit floor (above-rim flood sensor wet). Active flooding now."
    done_message: "Ejector flood sensor clear."
    notifiers:
      - gregs_iphone
    data:
      push:
        sound:
          name: default
          critical: 1
          volume: 1.0

  ejector_running_but_flooding:
    name: "🚨 Ejector running but flooding"
    entity_id: binary_sensor.ejector_running_but_flooding_alert
    state: "on"
    repeat: [1, 5]
    can_acknowledge: true
    skip_first: false
    title: "🚨 Ejector running but flooding"
    message: "Ejector pump is RUNNING yet water is at the floor — losing the battle, blocked/airlocked discharge, or recirculating."
    done_message: "Ejector running-but-flooding cleared."
    notifiers:
      - gregs_iphone
    data:
      push:
        sound:
          name: default
          critical: 1
          volume: 1.0

  ejector_protection_compromised:
    name: "🚨 Ejector protection compromised"
    entity_id: binary_sensor.ejector_protection_compromised_alert
    state: "on"
    repeat: [1, 10]
    can_acknowledge: true
    skip_first: false
    title: "🚨 Ejector protection compromised"
    message: "A primary ejector fault is active and/or the flood sensor is wet — the battery backup may now be load-bearing. Investigate immediately."
    done_message: "Ejector protection-compromised cleared."
    notifiers:
      - gregs_iphone
    data:
      push:
        sound:
          name: default
          critical: 1
          volume: 1.0

  # ===== CRITICAL — current-derived =====
  ejector_continuous_run:
    name: "Ejector continuous run"
    entity_id: binary_sensor.ejector_continuous_run_alert
    state: "on"
    repeat: [2, 10]
    can_acknowledge: true
    skip_first: false
    title: "⚠️ Ejector running too long"
    message: >
      Ejector has been running continuously past its {{ states('input_number.ejector_max_run_seconds') }}s cap
      (stuck float or inflow ≥ outflow).
    done_message: "Ejector continuous-run cleared."
    notifiers:
      - gregs_iphone

  ejector_sensor_unavailable:
    name: "Ejector sensor offline"
    entity_id: binary_sensor.ejector_sensor_unavailable_alert
    state: "on"
    repeat: [15]
    can_acknowledge: true
    skip_first: false
    title: "⚠️ Ejector monitoring offline"
    message: "The ejector CT or running sensor is unavailable — monitoring is blind."
    done_message: "Ejector sensors back online."
    notifiers:
      - gregs_iphone

  ejector_no_run:
    name: "Ejector has not run"
    entity_id: binary_sensor.ejector_no_run_alert
    state: "on"
    repeat: [5, 30]
    can_acknowledge: true
    skip_first: false
    title: "⚠️ Ejector has not run"
    message: >
      Ejector has not run in {{ (states('sensor.ejector_time_since_last_run') | float(0) / 60) | round(0) }} min —
      adaptive normal ≈ {{ (states('sensor.ejector_interval_median_14d') | float(0) / 60) | round(0) }} min.
    done_message: "Ejector cycled again."
    notifiers:
      - gregs_iphone
    data:
      push:
        sound:
          name: default
          critical: 1
          volume: 1.0

  # ===== WARNING tier =====
  ejector_flood_sensor_fault:
    name: "Ejector flood sensor fault"
    entity_id: binary_sensor.ejector_flood_sensor_fault_alert
    state: "on"
    repeat: [720]   # ~daily
    can_acknowledge: true
    skip_first: false
    title: "Ejector flood sensor fault"
    message: "The ejector flood sensor is unavailable or low-battery — last line of defense is blind."
    notifiers:
      - gregs_iphone

  ejector_short_interval:
    name: "Ejector short interval"
    entity_id: binary_sensor.ejector_short_interval_alert
    state: "on"
    repeat: [30]
    can_acknowledge: true
    skip_first: true   # combined with the sensor's persistence ≈ a hold
    title: "Ejector cycling fast"
    message: >
      Ejector restarting every {{ states('sensor.ejector_interval_between_starts') }}s — pit refilling fast
      (approaching pump capacity / heavy rain).
    notifiers:
      - gregs_iphone

  ejector_short_cycling:
    name: "Ejector short cycling"
    entity_id: binary_sensor.ejector_short_cycling_alert
    state: "on"
    repeat: [30]
    can_acknowledge: true
    skip_first: false
    title: "Ejector short cycling"
    message: >
      {{ states('sensor.ejector_runs_10m') }} starts in 10 min (stuck float / undersized pump signature).
    notifiers:
      - gregs_iphone

  ejector_duration_anomaly:
    name: "Ejector duration anomaly"
    entity_id: binary_sensor.ejector_duration_anomaly_alert
    state: "on"
    repeat: [60]
    can_acknowledge: true
    skip_first: false
    title: "Ejector run duration anomaly"
    message: >
      Last ejector run {{ states('sensor.ejector_last_run_duration') }}s vs mean
      {{ states('sensor.ejector_duration_mean') }}s — outside normal band.
    notifiers:
      - gregs_iphone

  ejector_current_load_high:
    name: "Ejector current high"
    entity_id: binary_sensor.ejector_current_load_high_alert
    state: "on"
    repeat: [720]   # ~daily
    can_acknowledge: true
    skip_first: false
    title: "Ejector load rising"
    message: >
      Ejector running current 7-day avg {{ states('sensor.ejector_current_short_7d') }} A vs 30-day baseline
      {{ states('sensor.ejector_current_baseline_30d') }} A (wear / partial clog early warning).
    notifiers:
      - gregs_iphone

  ejector_current_load_low:
    name: "Ejector current low"
    entity_id: binary_sensor.ejector_current_load_low_alert
    state: "on"
    repeat: [60]
    can_acknowledge: true
    skip_first: false
    title: "Ejector load low"
    message: >
      Ejector running current 7-day avg {{ states('sensor.ejector_current_short_7d') }} A is well below baseline
      {{ states('sensor.ejector_current_baseline_30d') }} A (sheared impeller / airlock / cavitation / stuck check valve).
    notifiers:
      - gregs_iphone

  ejector_current_spike:
    name: "Ejector current spike"
    entity_id: binary_sensor.ejector_current_spike_alert
    state: "on"
    repeat: [60]
    can_acknowledge: true
    skip_first: false
    title: "Ejector current spike"
    message: >
      Ejector peak current {{ states('sensor.ejector_run_peak_current') }} A exceeded the spike cutoff (possible jam).
    notifiers:
      - gregs_iphone

  ejector_high_duty_cycle:
    name: "Ejector high duty cycle"
    entity_id: binary_sensor.ejector_high_duty_cycle_alert
    state: "on"
    repeat: [120]
    can_acknowledge: true
    skip_first: false
    title: "Ejector high duty cycle"
    message: >
      Ejector duty cycle {{ states('sensor.ejector_duty_cycle_24h') }}% over 24h — losing the battle.
    notifiers:
      - gregs_iphone

# NOTE: ejector High Frequency alert intentionally omitted (toggle OFF / superseded
# by short_interval). binary_sensor.ejector_high_frequency exists for the dashboard.
# PHASE 2 SEAM: a rain-normalized daily-count alert plugs in here.
# ROADMAP: binary_sensor.ejector_high_water (in-pit float, early warning) becomes the
# top CRITICAL alert above flooding; binary_sensor.ejector_backup_running CRITICAL.
