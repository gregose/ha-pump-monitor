# =============================================================================
# pump_monitor_sump.yaml  —  SUMP pump monitoring (Layers 1-4)
# Plan §3, §6, §6a, §6b. Build bottom-up: each layer reads only the one below.
#
# Fixed inputs (read-only, plan §2; CT mapping confirmed Task 0: sump = CT2):
#   binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running   (running)
#   sensor.energy_meter_eth_ws_f3a598_ct2_amps                         (current)
#   binary_sensor.0x282c02bfffefb418_water_leak                        (flood, above rim)
#   sensor.0x282c02bfffefb418_battery                                  (flood battery)
#     ^ CONFIRMED by user (Task A). Guarded with float(100) default so a missing
#       reading never false-fires the low-battery fault.
#
# DESIGN — alert gating: Layer-3 binary sensors are PURE physical conditions
# (truthful for dashboard badges, composites, and the status tile). Because the
# `alert` integration cannot take a condition, each alert instead watches a thin
# gated wrapper `binary_sensor.sump_*_alert` = (pure condition) AND
# monitoring_enabled AND its per-alert toggle. Plan §9.
#
# ALL templates are availability-safe: every float() has a default and source
# reads are guarded so math never errors while statistics warm up (plan §13).
# =============================================================================

# -----------------------------------------------------------------------------
# Layer 1 — per-cycle trigger template sensors + derived templates
# -----------------------------------------------------------------------------
template:
  # --- trigger: record last START time on off→on (restart-robust anchor) ------
  - trigger:
      - platform: state
        entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running
        from: "off"
        to: "on"
    sensor:
      - name: "Sump Last Start Time"
        unique_id: pm_sump_last_start_time
        device_class: timestamp
        state: "{{ trigger.to_state.last_changed }}"

  # --- trigger: record last STOP time on on→off -------------------------------
  - trigger:
      - platform: state
        entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running
        from: "on"
        to: "off"
    sensor:
      - name: "Sump Last Stop Time"
        unique_id: pm_sump_last_stop_time
        device_class: timestamp
        state: "{{ trigger.to_state.last_changed }}"

  # --- trigger: run duration on on→off ----------------------------------------
  - trigger:
      - platform: state
        entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running
        from: "on"
        to: "off"
    sensor:
      - name: "Sump Last Run Duration"
        unique_id: pm_sump_last_run_duration
        device_class: duration
        unit_of_measurement: "s"
        state_class: measurement
        state: >
          {{ (as_timestamp(trigger.to_state.last_changed)
              - as_timestamp(trigger.from_state.last_changed)) | round(1) }}

  # --- trigger: start-to-start interval on off→on (prev start in attribute) ---
  - trigger:
      - platform: state
        entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running
        from: "off"
        to: "on"
    sensor:
      - name: "Sump Interval Between Starts"
        unique_id: pm_sump_interval
        device_class: duration
        unit_of_measurement: "s"
        state_class: measurement
        state: >
          {% set prev = this.attributes.get('last_start') %}
          {{ (as_timestamp(trigger.to_state.last_changed) - as_timestamp(prev)) | round(0)
             if prev else 0 }}
        attributes:
          last_start: "{{ trigger.to_state.last_changed }}"

  # --- trigger: idle gap on off→on (prev STOP → this START = inflow proxy) -----
  - trigger:
      - platform: state
        entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running
        from: "off"
        to: "on"
    sensor:
      - name: "Sump Idle Gap"
        unique_id: pm_sump_idle_gap
        device_class: duration
        unit_of_measurement: "s"
        state_class: measurement
        # prev stop comes DIRECTLY from sump_last_stop_time (set on the prior
        # on→off, so it already holds the stop preceding THIS start). Do NOT stash
        # it in a self-attribute — that lags one firing and ~doubles the gap.
        state: >
          {% set prev_stop = states('sensor.sump_last_stop_time') %}
          {{ (as_timestamp(trigger.to_state.last_changed) - as_timestamp(prev_stop)) | round(0)
             if prev_stop not in ['unknown', 'unavailable', 'None', ''] else 0 }}

  # --- trigger: per-run peak current (start edge + every CT sample) ------------
  - trigger:
      - platform: state
        entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running
        to: "on"
        id: start
      - platform: state
        entity_id: sensor.energy_meter_eth_ws_f3a598_ct2_amps   # sump = CT2
        id: sample
    sensor:
      # Post-startup peak: ignores the first startup_ignore_s so the peak (and the
      # current_spike alert it feeds) reflects a SUSTAINED jam, not the inrush.
      # The inrush is captured separately by Sump Startup Current (observational).
      - name: "Sump Run Peak Current"
        unique_id: pm_sump_run_peak_current
        device_class: current
        unit_of_measurement: "A"
        state_class: measurement
        state: >
          {% set cur = states('sensor.energy_meter_eth_ws_f3a598_ct2_amps') | float(0) %}
          {% set win = states('input_number.sump_startup_ignore_s') | float(2) %}
          {% set st = states('sensor.sump_last_start_time') %}
          {% set el = ((now()|as_timestamp) - (st|as_timestamp(0))) if st not in ['unknown','unavailable','None',''] else 999 %}
          {% if trigger.id == 'start' %}
            0
          {% elif is_state('binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running','on') and el >= win %}
            {{ [ this.state | float(0), cur ] | max }}
          {% else %}
            {{ this.state | float(0) }}
          {% endif %}

      # Startup current — peak seen DURING the first startup_ignore_s of a run:
      # the inrush glimpse the ~1 Hz CT can catch. One value/run, NOISE-PRONE
      # (sub-second surge vs 1 Hz sampling), so it is OBSERVATIONAL ONLY — no
      # alert reads it. Trend it via Sump Startup Current Median 30.
      - name: "Sump Startup Current"
        unique_id: pm_sump_startup_current
        device_class: current
        unit_of_measurement: "A"
        state_class: measurement
        state: >
          {% set cur = states('sensor.energy_meter_eth_ws_f3a598_ct2_amps') | float(0) %}
          {% set win = states('input_number.sump_startup_ignore_s') | float(2) %}
          {% set st = states('sensor.sump_last_start_time') %}
          {% set el = ((now()|as_timestamp) - (st|as_timestamp(0))) if st not in ['unknown','unavailable','None',''] else 999 %}
          {% if trigger.id == 'start' %}
            {{ cur }}
          {% elif is_state('binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running','on') and el < win %}
            {{ [ this.state | float(0), cur ] | max }}
          {% else %}
            {{ this.state | float(0) }}
          {% endif %}

  # --- trigger: per-run AVERAGE current (accumulate sum/count, divide on stop) -
  # One value per completed cycle → the clean per-cycle feed for the 7d/30d
  # current baselines (sourcing the raw 1 Hz stream would swamp sampling_size on
  # a fast-cycling pump and collapse the 7d/30d windows into the same few days).
  - trigger:
      - platform: state
        entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running
        to: "on"
        id: start
      - platform: state
        entity_id: sensor.energy_meter_eth_ws_f3a598_ct2_amps
        id: sample
      - platform: state
        entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running
        from: "on"
        to: "off"
        id: stop
    sensor:
      - name: "Sump Run Avg Current"
        unique_id: pm_sump_run_avg_current
        device_class: current
        unit_of_measurement: "A"
        state_class: measurement
        # state holds the previous run's mean until a new run completes.
        state: >
          {% if trigger.id == 'stop' %}
            {% set n = this.attributes.get('n', 0) | int %}
            {% set s = this.attributes.get('sum', 0) | float %}
            {{ (s / n) | round(2) if n > 0 else this.state | float(0) }}
          {% else %}
            {{ this.state | float(0) }}
          {% endif %}
        attributes:
          # `this` reflects pre-update attributes, so accumulation is correct.
          # samples in the first startup_ignore_s (inrush) are skipped → the mean
          # is steady-state, immune to run frequency (inrush no longer pulls it up)
          n: >
            {% set win = states('input_number.sump_startup_ignore_s') | float(2) %}
            {% set st = states('sensor.sump_last_start_time') %}
            {% set el = ((now()|as_timestamp) - (st|as_timestamp(0))) if st not in ['unknown','unavailable','None',''] else 999 %}
            {% if trigger.id == 'start' %}0
            {% elif trigger.id == 'sample' and is_state('binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running','on') and el >= win %}{{ (this.attributes.get('n', 0) | int) + 1 }}
            {% else %}{{ this.attributes.get('n', 0) | int }}{% endif %}
          sum: >
            {% set win = states('input_number.sump_startup_ignore_s') | float(2) %}
            {% set st = states('sensor.sump_last_start_time') %}
            {% set el = ((now()|as_timestamp) - (st|as_timestamp(0))) if st not in ['unknown','unavailable','None',''] else 999 %}
            {% if trigger.id == 'start' %}0
            {% elif trigger.id == 'sample' and is_state('binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running','on') and el >= win %}{{ (this.attributes.get('sum', 0) | float) + (states('sensor.energy_meter_eth_ws_f3a598_ct2_amps') | float(0)) }}
            {% else %}{{ this.attributes.get('sum', 0) | float }}{% endif %}

  # --- trigger: lifetime runtime odometer (cumulative; total_increasing) -------
  # Chosen over utility_meter: on-time isn't a monotonic source sensor, so a
  # trigger sensor that adds each completed run's duration is simpler and truly
  # cumulative. total_increasing → feeds Long-Term Statistics; survives restart.
  - trigger:
      - platform: state
        entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running
        from: "on"
        to: "off"
    sensor:
      - name: "Sump Lifetime Runtime"
        unique_id: pm_sump_lifetime_runtime
        device_class: duration
        unit_of_measurement: "s"
        state_class: total_increasing
        state: >
          {{ ((this.state | float(0))
              + (as_timestamp(trigger.to_state.last_changed)
                 - as_timestamp(trigger.from_state.last_changed))) | round(0) }}

  # --- regular templates ------------------------------------------------------
  - sensor:
      # passthrough of CT current ONLY while running → clean feed for baselines
      - name: "Sump Run Current Active"
        unique_id: pm_sump_run_current_active
        device_class: current
        unit_of_measurement: "A"
        state_class: measurement
        availability: >
          {{ is_state('binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running','on') }}
        state: "{{ states('sensor.energy_meter_eth_ws_f3a598_ct2_amps') | float(0) }}"

      # time since last start — references now() so it re-evaluates ~once a minute,
      # driving the no-run watchdog. Keyed off the stored start time (restart-robust).
      - name: "Sump Time Since Last Run"
        unique_id: pm_sump_time_since_last_run
        device_class: duration
        unit_of_measurement: "s"
        state: >
          {% set start = states('sensor.sump_last_start_time') %}
          {% if start in ['unknown','unavailable','None',''] or start is none %}
            0
          {% else %}
            {{ [ (now() | as_timestamp) - (start | as_timestamp(0)), 0 ] | max | round(0) }}
          {% endif %}

      # inflow index — refills/hour ≈ 3600 / idle_gap. Storm-signature trace today.
      - name: "Sump Inflow Index"
        unique_id: pm_sump_inflow_index
        unit_of_measurement: "/h"
        state_class: measurement
        state: >
          {% set gap = states('sensor.sump_idle_gap') | float(0) %}
          {{ (3600 / ([gap, 5] | max)) | round(2) }}

      # duty cycle over 24h (%) = on-time hours / 24 * 100
      - name: "Sump Duty Cycle 24h"
        unique_id: pm_sump_duty_cycle_24h
        unit_of_measurement: "%"
        state_class: measurement
        state: >
          {{ (states('sensor.sump_ontime_24h') | float(0) / 24 * 100) | round(1) }}

  # (plan §6 optional) sensor.sump_run_avg_current IS implemented above — it is
  # the per-cycle feed for the 7d/30d current baselines. sensor.sump_run_current_active
  # is kept as the instantaneous while-running passthrough for live charting.

# -----------------------------------------------------------------------------
# Layer 3 — health / anomaly binary sensors (PURE conditions; ungated)
#   + §6b water-safety composites. Alert gating lives in the wrappers further down.
# -----------------------------------------------------------------------------
  - binary_sensor:
      - name: "Sump Run Duration Anomaly"
        unique_id: pm_sump_run_duration_anomaly
        device_class: problem
        state: >
          {% set d  = states('sensor.sump_last_run_duration') | float(0) %}
          {% set m  = states('sensor.sump_duration_mean') | float(0) %}
          {% set sd = [ states('sensor.sump_duration_stddev') | float(0), 2 ] | max %}
          {% set z  = states('input_number.sump_duration_zscore_mult') | float(3) %}
          {{ m > 0 and d > 0 and (d > m + z * sd or d < m - z * sd) }}

      - name: "Sump Short Interval"
        unique_id: pm_sump_short_interval
        device_class: problem
        # fires when latest start-to-start interval is below the higher of the
        # fixed floor and the learned 5th-percentile. Sustain is enforced by the
        # alert's `for:` hold (§9) so a lone check-valve burp doesn't page.
        state: >
          {% set iv    = states('sensor.sump_interval_between_starts') | float(0) %}
          {% set fixed = states('input_number.sump_short_interval_seconds') | float(30) %}
          {% set p05   = states('sensor.sump_interval_p05_14d') | float(0) %}
          {% set floor = [ fixed, p05 ] | max %}
          {{ iv > 0 and iv < floor }}

      - name: "Sump Short Cycling"
        unique_id: pm_sump_short_cycling
        device_class: problem
        # count-in-window view (stuck-float / undersized signature). Window is the
        # fixed 10-min history_stats count below; the helper documents intent.
        # To change the window, edit sensor.sump_runs_10m's duration (seam).
        state: >
          {% set c = states('sensor.sump_runs_10m') | float(0) %}
          {% set m = states('input_number.sump_short_cycle_max_starts') | float(4) %}
          {{ c > m }}

      - name: "Sump Continuous Run"
        unique_id: pm_sump_continuous_run
        device_class: problem
        # highest-priority current-derived signal: on AND elapsed > max_run_seconds
        state: >
          {% set running = is_state('binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running','on') %}
          {% set lc = states.binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running.last_changed %}
          {% set elapsed = (now() | as_timestamp) - (lc | as_timestamp(now() | as_timestamp)) if running else 0 %}
          {% set cap = states('input_number.sump_max_run_seconds') | float(120) %}
          {{ running and elapsed > cap }}

      - name: "Sump Current Load High"
        unique_id: pm_sump_current_load_high
        device_class: problem
        state: >
          {% set s7  = states('sensor.sump_current_short_7d') | float(0) %}
          {% set b30 = states('sensor.sump_current_baseline_30d') | float(0) %}
          {% set drift = states('input_number.sump_current_drift_pct') | float(20) %}
          {{ b30 > 0 and s7 > b30 * (1 + drift / 100) }}

      # ACUTE (critical): last-5-runs median well below baseline = running but
      # not moving water. Uses the 5-run window, NOT the 7d mean, so it reacts in
      # a few runs. (current_load_high stays on the 7d mean — wear is gradual.)
      - name: "Sump Current Load Low"
        unique_id: pm_sump_current_load_low
        device_class: problem
        state: >
          {% set s5  = states('sensor.sump_current_short_5run') | float(0) %}
          {% set b30 = states('sensor.sump_current_baseline_30d') | float(0) %}
          {% set low = states('input_number.sump_current_low_pct') | float(60) %}
          {{ b30 > 0 and s5 > 0 and s5 < b30 * low / 100 }}

      - name: "Sump Current Spike"
        unique_id: pm_sump_current_spike
        device_class: problem
        # disabled until the user sets a non-zero absolute cutoff (§7)
        state: >
          {% set pk = states('sensor.sump_run_peak_current') | float(0) %}
          {% set sp = states('input_number.sump_current_spike_a') | float(0) %}
          {{ sp > 0 and pk > sp }}

      - name: "Sump High Duty Cycle"
        unique_id: pm_sump_high_duty_cycle
        device_class: problem
        state: >
          {% set dc  = states('sensor.sump_duty_cycle_24h') | float(0) %}
          {% set lim = states('input_number.sump_high_duty_cycle_pct') | float(50) %}
          {{ dc > lim }}

      - name: "Sump Sensor Unavailable"
        unique_id: pm_sump_sensor_unavailable
        device_class: problem
        delay_on: { seconds: 60 }   # debounce transient drops
        state: >
          {% set ct  = states('sensor.energy_meter_eth_ws_f3a598_ct2_amps') %}
          {% set bin = states('binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running') %}
          {{ ct in ['unknown','unavailable'] or bin in ['unknown','unavailable'] }}

      - name: "Sump No Run Watchdog"
        unique_id: pm_sump_no_run_watchdog
        device_class: problem
        # ADAPTIVE (plan §6). Warm-up = fixed fallback until history_ready flips;
        # steady-state = clamp(floor, ceiling, multiplier × 14d median interval).
        # Median tracks seasonal drift automatically.
        state: >
          {% set since  = states('sensor.sump_time_since_last_run') | float(0) %}
          {% set ready  = is_state('input_boolean.sump_no_run_history_ready','on') %}
          {% set median = states('sensor.sump_interval_median_14d') | float(0) %}
          {% set mult   = states('input_number.sump_no_run_multiplier') | float(3) %}
          {% set floor  = states('input_number.sump_no_run_floor_min') | float(45) * 60 %}
          {% set ceil   = states('input_number.sump_no_run_ceiling_min') | float(120) * 60 %}
          {% set warmup = states('input_number.sump_no_run_warmup_fixed_min') | float(90) * 60 %}
          {% if ready and median > 0 %}
            {% set thresh = [ floor, [ ceil, mult * median ] | min ] | max %}
          {% else %}
            {% set thresh = warmup %}
          {% endif %}
          {{ since > 0 and since > thresh }}

      - name: "Sump High Frequency"
        unique_id: pm_sump_high_frequency
        device_class: problem
        # built but alert OFF (superseded by short_interval; revisit Phase 2).
        # ROADMAP: replace fixed ceiling with a rain-normalized daily view.
        # Threshold is the live sump_high_frequency_max helper (default 1500) — a
        # fixed 60 was always tripped by the sump's normal ~215/day cadence.
        state: >
          {{ states('sensor.sump_runs_24h') | float(0)
             > states('input_number.sump_high_frequency_max') | float(1500) }}

      # --- §6b water-safety layer ---------------------------------------------
      - name: "Sump Running But Flooding"
        unique_id: pm_sump_running_but_flooding
        device_class: problem
        state: >
          {{ is_state('binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running','on')
             and is_state('binary_sensor.0x282c02bfffefb418_water_leak','on') }}

      - name: "Sump Flood Sensor Fault"
        unique_id: pm_sump_flood_sensor_fault
        device_class: problem
        delay_on: { seconds: 60 }
        state: >
          {% set leak = states('binary_sensor.0x282c02bfffefb418_water_leak') %}
          {% set batt = states('sensor.0x282c02bfffefb418_battery') | float(100) %}
          {% set lowpct = states('input_number.flood_sensor_low_battery_pct') | float(20) %}
          {{ leak in ['unknown','unavailable'] or batt < lowpct }}

  # --- composite status tile (truthful; ignores toggles) ----------------------
  - sensor:
      - name: "Sump Status"
        unique_id: pm_sump_status_ok
        icon: >
          {% set s = states('sensor.sump_status') %}
          {{ 'mdi:alert-octagon' if s == 'critical'
             else 'mdi:alert' if s == 'warning' else 'mdi:check-circle' }}
        state: >
          {% set flood   = is_state('binary_sensor.0x282c02bfffefb418_water_leak','on') %}
          {% set loadlow = is_state('binary_sensor.sump_current_load_low','on') %}
          {% set cont    = is_state('binary_sensor.sump_continuous_run','on') %}
          {% set norun   = is_state('binary_sensor.sump_no_run_watchdog','on') %}
          {% set unavail = is_state('binary_sensor.sump_sensor_unavailable','on') %}
          {% set rbf     = is_state('binary_sensor.sump_running_but_flooding','on') %}
          {% set warns = [
               is_state('binary_sensor.sump_run_duration_anomaly','on'),
               is_state('binary_sensor.sump_short_interval','on'),
               is_state('binary_sensor.sump_short_cycling','on'),
               is_state('binary_sensor.sump_current_load_high','on'),
               is_state('binary_sensor.sump_current_spike','on'),
               is_state('binary_sensor.sump_high_duty_cycle','on'),
               is_state('binary_sensor.sump_flood_sensor_fault','on') ] %}
          {% if flood or rbf or loadlow or cont or norun or unavail %}
            critical
          {% elif warns | select('==', true) | list | count > 0 %}
            warning
          {% else %}
            ok
          {% endif %}
        attributes:
          reason: >
            {% set r = namespace(items=[]) %}
            {% if is_state('binary_sensor.0x282c02bfffefb418_water_leak','on') %}{% set r.items = r.items + ['FLOODING'] %}{% endif %}
            {% if is_state('binary_sensor.sump_running_but_flooding','on') %}{% set r.items = r.items + ['running but flooding'] %}{% endif %}
            {% if is_state('binary_sensor.sump_continuous_run','on') %}{% set r.items = r.items + ['continuous run'] %}{% endif %}
            {% if is_state('binary_sensor.sump_no_run_watchdog','on') %}{% set r.items = r.items + ['no run'] %}{% endif %}
            {% if is_state('binary_sensor.sump_sensor_unavailable','on') %}{% set r.items = r.items + ['sensor offline'] %}{% endif %}
            {% if is_state('binary_sensor.sump_run_duration_anomaly','on') %}{% set r.items = r.items + ['duration anomaly'] %}{% endif %}
            {% if is_state('binary_sensor.sump_short_interval','on') %}{% set r.items = r.items + ['short interval'] %}{% endif %}
            {% if is_state('binary_sensor.sump_short_cycling','on') %}{% set r.items = r.items + ['short cycling'] %}{% endif %}
            {% if is_state('binary_sensor.sump_current_load_high','on') %}{% set r.items = r.items + ['current high'] %}{% endif %}
            {% if is_state('binary_sensor.sump_current_load_low','on') %}{% set r.items = r.items + ['current low'] %}{% endif %}
            {% if is_state('binary_sensor.sump_current_spike','on') %}{% set r.items = r.items + ['current spike'] %}{% endif %}
            {% if is_state('binary_sensor.sump_high_duty_cycle','on') %}{% set r.items = r.items + ['high duty cycle'] %}{% endif %}
            {% if is_state('binary_sensor.sump_flood_sensor_fault','on') %}{% set r.items = r.items + ['flood sensor fault'] %}{% endif %}
            {{ r.items | join(', ') if r.items else 'All clear' }}

  # --- gated alert-source wrappers (alert ⇐ condition AND monitoring AND toggle)
  - binary_sensor:
      - name: "Sump Flooding Alert"
        unique_id: pm_sump_flooding_alert
        state: >
          {{ is_state('binary_sensor.0x282c02bfffefb418_water_leak','on')
             and is_state('input_boolean.sump_monitoring_enabled','on')
             and is_state('input_boolean.sump_alert_flood_enabled','on') }}
      - name: "Sump Running But Flooding Alert"
        unique_id: pm_sump_running_but_flooding_alert
        state: >
          {{ is_state('binary_sensor.sump_running_but_flooding','on')
             and is_state('input_boolean.sump_monitoring_enabled','on')
             and is_state('input_boolean.sump_alert_running_but_flooding_enabled','on') }}
      - name: "Sump Continuous Run Alert"
        unique_id: pm_sump_continuous_run_alert
        state: >
          {{ is_state('binary_sensor.sump_continuous_run','on')
             and is_state('input_boolean.sump_monitoring_enabled','on')
             and is_state('input_boolean.sump_alert_continuous_run_enabled','on') }}
      - name: "Sump Sensor Unavailable Alert"
        unique_id: pm_sump_sensor_unavailable_alert
        state: >
          {{ is_state('binary_sensor.sump_sensor_unavailable','on')
             and is_state('input_boolean.sump_monitoring_enabled','on')
             and is_state('input_boolean.sump_alert_sensor_unavailable_enabled','on') }}
      - name: "Sump No Run Alert"
        unique_id: pm_sump_no_run_alert
        state: >
          {{ is_state('binary_sensor.sump_no_run_watchdog','on')
             and is_state('input_boolean.sump_monitoring_enabled','on')
             and is_state('input_boolean.sump_alert_no_run_enabled','on') }}
      - name: "Sump Flood Sensor Fault Alert"
        unique_id: pm_sump_flood_sensor_fault_alert
        state: >
          {{ is_state('binary_sensor.sump_flood_sensor_fault','on')
             and is_state('input_boolean.sump_monitoring_enabled','on')
             and is_state('input_boolean.sump_alert_flood_sensor_fault_enabled','on') }}
      - name: "Sump Short Interval Alert"
        unique_id: pm_sump_short_interval_alert
        state: >
          {{ is_state('binary_sensor.sump_short_interval','on')
             and is_state('input_boolean.sump_monitoring_enabled','on')
             and is_state('input_boolean.sump_alert_short_interval_enabled','on') }}
      - name: "Sump Short Cycling Alert"
        unique_id: pm_sump_short_cycling_alert
        state: >
          {{ is_state('binary_sensor.sump_short_cycling','on')
             and is_state('input_boolean.sump_monitoring_enabled','on')
             and is_state('input_boolean.sump_alert_short_cycle_enabled','on') }}
      - name: "Sump Duration Anomaly Alert"
        unique_id: pm_sump_duration_anomaly_alert
        state: >
          {{ is_state('binary_sensor.sump_run_duration_anomaly','on')
             and is_state('input_boolean.sump_monitoring_enabled','on')
             and is_state('input_boolean.sump_alert_duration_anomaly_enabled','on') }}
      - name: "Sump Current Load High Alert"
        unique_id: pm_sump_current_load_high_alert
        state: >
          {{ is_state('binary_sensor.sump_current_load_high','on')
             and is_state('input_boolean.sump_monitoring_enabled','on')
             and is_state('input_boolean.sump_alert_current_load_enabled','on') }}
      - name: "Sump Current Load Low Alert"
        unique_id: pm_sump_current_load_low_alert
        state: >
          {{ is_state('binary_sensor.sump_current_load_low','on')
             and is_state('input_boolean.sump_monitoring_enabled','on')
             and is_state('input_boolean.sump_alert_current_load_enabled','on') }}
      - name: "Sump Current Spike Alert"
        unique_id: pm_sump_current_spike_alert
        state: >
          {{ is_state('binary_sensor.sump_current_spike','on')
             and is_state('input_boolean.sump_monitoring_enabled','on')
             and is_state('input_boolean.sump_alert_current_load_enabled','on') }}
      - name: "Sump High Duty Cycle Alert"
        unique_id: pm_sump_high_duty_cycle_alert
        state: >
          {{ is_state('binary_sensor.sump_high_duty_cycle','on')
             and is_state('input_boolean.sump_monitoring_enabled','on')
             and is_state('input_boolean.sump_alert_duty_cycle_enabled','on') }}

# -----------------------------------------------------------------------------
# Layer 2 — aggregates: history_stats (counts/on-time) + statistics (baselines)
# -----------------------------------------------------------------------------
sensor:
  - platform: history_stats
    name: "Sump Runs 1h"
    unique_id: pm_sump_runs_1h
    entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running
    state: "on"
    type: count
    start: "{{ now() - timedelta(hours=1) }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: "Sump Runs 10m"      # short-cycle window (see binary_sensor.sump_short_cycling)
    unique_id: pm_sump_runs_10m
    entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running
    state: "on"
    type: count
    start: "{{ now() - timedelta(minutes=10) }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: "Sump Runs 24h"
    unique_id: pm_sump_runs_24h
    entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running
    state: "on"
    type: count
    start: "{{ now() - timedelta(hours=24) }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: "Sump Ontime 24h"    # duty-cycle base (hours)
    unique_id: pm_sump_ontime_24h
    entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running
    state: "on"
    type: time
    start: "{{ now() - timedelta(hours=24) }}"
    end: "{{ now() }}"

  # --- statistics baselines (self-tuning) ------------------------------------
  - platform: statistics
    name: "Sump Duration Mean"
    unique_id: pm_sump_duration_mean
    entity_id: sensor.sump_last_run_duration
    state_characteristic: mean
    sampling_size: 5000
    max_age: { days: 14 }
  - platform: statistics
    name: "Sump Duration Stddev"
    unique_id: pm_sump_duration_stddev
    entity_id: sensor.sump_last_run_duration
    state_characteristic: standard_deviation   # σ-like spread; see note
    sampling_size: 5000
    max_age: { days: 14 }
  - platform: statistics
    name: "Sump Interval Mean"
    unique_id: pm_sump_interval_mean
    entity_id: sensor.sump_interval_between_starts
    state_characteristic: mean
    sampling_size: 5000
    max_age: { days: 14 }
  - platform: statistics
    name: "Sump Interval Stddev"
    unique_id: pm_sump_interval_stddev
    entity_id: sensor.sump_interval_between_starts
    state_characteristic: standard_deviation
    sampling_size: 5000
    max_age: { days: 14 }
  - platform: statistics
    name: "Sump Interval Median 14d"
    unique_id: pm_sump_interval_median_14d
    entity_id: sensor.sump_interval_between_starts
    state_characteristic: median
    sampling_size: 5000
    max_age: { days: 14 }
  - platform: statistics
    name: "Sump Interval P05 14d"
    unique_id: pm_sump_interval_p05_14d
    entity_id: sensor.sump_interval_between_starts
    state_characteristic: percentile
    percentile: 5
    sampling_size: 5000
    max_age: { days: 14 }
  - platform: statistics
    name: "Sump Idle Gap Median 14d"
    unique_id: pm_sump_idle_gap_median_14d
    entity_id: sensor.sump_idle_gap
    state_characteristic: median
    sampling_size: 5000
    max_age: { days: 14 }
  # current baselines fed by the PER-RUN mean (one value/cycle) so 7d and 30d are
  # genuinely different windows even on a fast-cycling pump. sampling_size sized
  # to hold the full window at the measured cadence (~238 cycles/day).
  - platform: statistics
    name: "Sump Current Baseline 30d"
    unique_id: pm_sump_current_baseline_30d
    entity_id: sensor.sump_run_avg_current
    state_characteristic: mean
    sampling_size: 8000
    max_age: { days: 30 }
  - platform: statistics
    name: "Sump Current Short 7d"
    unique_id: pm_sump_current_short_7d
    entity_id: sensor.sump_run_avg_current
    state_characteristic: mean
    sampling_size: 2500
    max_age: { days: 7 }
  # last-5-runs median → the ACUTE "running but not pumping" signal. No max_age:
  # it's purely the last 5 runs, so it reacts within a few runs (minutes during a
  # storm) instead of the days a 7d mean would take. Median rejects a single fluke.
  - platform: statistics
    name: "Sump Current Short 5run"
    unique_id: pm_sump_current_short_5run
    entity_id: sensor.sump_run_avg_current
    state_characteristic: median
    sampling_size: 5
  - platform: statistics
    name: "Sump Current Stddev 30d"
    unique_id: pm_sump_current_stddev_30d
    entity_id: sensor.sump_run_avg_current
    state_characteristic: standard_deviation
    sampling_size: 8000
    max_age: { days: 30 }
  # smoothed startup-current trend (observational): 30-run rolling median rides
  # over the per-run inrush noise. A slow rise MIGHT hint at a weakening start
  # capacitor / stiffening bearings — not alerted, just recorded to watch.
  - platform: statistics
    name: "Sump Startup Current Median 30"
    unique_id: pm_sump_startup_current_median_30
    entity_id: sensor.sump_startup_current
    state_characteristic: median
    sampling_size: 30
    max_age: { days: 60 }
  # longer-window duty cycle = mean of the rolling 24h duty (uses stats storage,
  # so it survives the ~10d recorder purge that would break a 30d history_stats).
  - platform: statistics
    name: "Sump Duty Cycle 7d"
    unique_id: pm_sump_duty_cycle_7d
    entity_id: sensor.sump_duty_cycle_24h
    state_characteristic: mean
    sampling_size: 5000
    max_age: { days: 7 }
  - platform: statistics
    name: "Sump Duty Cycle 30d"
    unique_id: pm_sump_duty_cycle_30d
    entity_id: sensor.sump_duty_cycle_24h
    state_characteristic: mean
    sampling_size: 15000
    max_age: { days: 30 }

# -----------------------------------------------------------------------------
# Layer 2 — lifetime cycle odometer (counter + increment automation)
#   counter (not auto-resetting) → user resets via counter.reset on pump swap.
# -----------------------------------------------------------------------------
counter:
  sump_lifetime_cycles:
    name: "Sump Lifetime Cycles"
    icon: mdi:counter
    step: 1

automation:
  - id: pm_sump_increment_cycles
    alias: "Pump Monitor: increment sump lifetime cycles"
    trigger:
      - platform: state
        entity_id: binary_sensor.circuitsetup_energy_meter_f3a598_sump_pump_running
        from: "on"
        to: "off"
    action:
      - service: counter.increment
        target:
          entity_id: counter.sump_lifetime_cycles
    mode: queued

# -----------------------------------------------------------------------------
# Layer 4 — alerts (ack + re-notify). Each watches a gated wrapper above.
#   Ordered by priority; flood/safety tier outranks current-derived alerts (§9).
#   Critical tier uses iOS critical interruption sound to cut through DND.
# -----------------------------------------------------------------------------
alert:
  # ===== CRITICAL — water-safety tier (§6b) =====
  sump_flooding:
    name: "🚨 SUMP FLOODING"
    entity_id: binary_sensor.sump_flooding_alert
    state: "on"
    repeat: [1, 5]
    can_acknowledge: true
    skip_first: false
    title: "🚨 Sump flooding"
    message: "Water detected at the SUMP pit floor (above-rim flood sensor wet). Active flooding now."
    done_message: "Sump flood sensor clear."
    notifiers:
      - gregs_iphone
    data:
      push:
        sound:
          name: default
          critical: 1
          volume: 1.0

  sump_running_but_flooding:
    name: "🚨 Sump running but flooding"
    entity_id: binary_sensor.sump_running_but_flooding_alert
    state: "on"
    repeat: [1, 5]
    can_acknowledge: true
    skip_first: false
    title: "🚨 Sump running but flooding"
    message: "Sump pump is RUNNING yet water is at the floor — losing the battle, blocked/airlocked discharge, or recirculating."
    done_message: "Sump running-but-flooding cleared."
    notifiers:
      - gregs_iphone
    data:
      push:
        sound:
          name: default
          critical: 1
          volume: 1.0

  # ===== CRITICAL — current-derived =====
  sump_continuous_run:
    name: "Sump continuous run"
    entity_id: binary_sensor.sump_continuous_run_alert
    state: "on"
    repeat: [2, 10]
    can_acknowledge: true
    skip_first: false
    title: "⚠️ Sump running too long"
    message: >
      Sump has been running continuously past its {{ states('input_number.sump_max_run_seconds') }}s cap
      (stuck float or inflow ≥ outflow).
    done_message: "Sump continuous-run cleared."
    notifiers:
      - gregs_iphone

  sump_sensor_unavailable:
    name: "Sump sensor offline"
    entity_id: binary_sensor.sump_sensor_unavailable_alert
    state: "on"
    repeat: [15]
    can_acknowledge: true
    skip_first: false
    title: "⚠️ Sump monitoring offline"
    message: "The sump CT or running sensor is unavailable — monitoring is blind."
    done_message: "Sump sensors back online."
    notifiers:
      - gregs_iphone

  sump_no_run:
    name: "Sump has not run"
    entity_id: binary_sensor.sump_no_run_alert
    state: "on"
    repeat: [5, 30]
    can_acknowledge: true
    skip_first: false
    title: "⚠️ Sump has not run"
    message: >
      Sump has not run in {{ (states('sensor.sump_time_since_last_run') | float(0) / 60) | round(0) }} min —
      adaptive normal ≈ {{ (states('sensor.sump_interval_median_14d') | float(0) / 60) | round(0) }} min.
    done_message: "Sump cycled again."
    notifiers:
      - gregs_iphone
    data:
      push:
        sound:
          name: default
          critical: 1
          volume: 1.0

  # ===== WARNING tier =====
  sump_flood_sensor_fault:
    name: "Sump flood sensor fault"
    entity_id: binary_sensor.sump_flood_sensor_fault_alert
    state: "on"
    repeat: [720]   # ~daily
    can_acknowledge: true
    skip_first: false
    title: "Sump flood sensor fault"
    message: "The sump flood sensor is unavailable or low-battery — last line of defense is blind."
    notifiers:
      - gregs_iphone

  sump_short_interval:
    name: "Sump short interval"
    entity_id: binary_sensor.sump_short_interval_alert
    state: "on"
    repeat: [30]
    can_acknowledge: true
    skip_first: true   # combined with the sensor's persistence ≈ a hold
    title: "Sump cycling fast"
    message: >
      Sump restarting every {{ states('sensor.sump_interval_between_starts') }}s — pit refilling fast
      (approaching pump capacity / heavy rain).
    notifiers:
      - gregs_iphone

  sump_short_cycling:
    name: "Sump short cycling"
    entity_id: binary_sensor.sump_short_cycling_alert
    state: "on"
    repeat: [30]
    can_acknowledge: true
    skip_first: false
    title: "Sump short cycling"
    message: >
      {{ states('sensor.sump_runs_10m') }} starts in 10 min (stuck float / undersized pump signature).
    notifiers:
      - gregs_iphone

  sump_duration_anomaly:
    name: "Sump duration anomaly"
    entity_id: binary_sensor.sump_duration_anomaly_alert
    state: "on"
    repeat: [60]
    can_acknowledge: true
    skip_first: false
    title: "Sump run duration anomaly"
    message: >
      Last sump run {{ states('sensor.sump_last_run_duration') }}s vs mean
      {{ states('sensor.sump_duration_mean') }}s — outside normal band.
    notifiers:
      - gregs_iphone

  sump_current_load_high:
    name: "Sump current high"
    entity_id: binary_sensor.sump_current_load_high_alert
    state: "on"
    repeat: [720]   # ~daily
    can_acknowledge: true
    skip_first: false
    title: "Sump load rising"
    message: >
      Sump running current 7-day avg {{ states('sensor.sump_current_short_7d') }} A vs 30-day baseline
      {{ states('sensor.sump_current_baseline_30d') }} A (wear / partial clog early warning).
    notifiers:
      - gregs_iphone

  sump_current_load_low:
    name: "🚨 Sump running but not pumping"
    entity_id: binary_sensor.sump_current_load_low_alert
    state: "on"
    repeat: [1, 10]
    can_acknowledge: true
    skip_first: false
    title: "🚨 Sump running but not pumping"
    message: >
      Recent sump runs are drawing {{ states('sensor.sump_current_short_5run') }} A (median of last 5),
      well below the {{ states('sensor.sump_current_baseline_30d') }} A baseline — the pump runs but
      moves little/no water (sheared impeller / airlock / cavitation / stuck check valve). Backup may be load-bearing.
    done_message: "Sump load-low cleared."
    notifiers:
      - gregs_iphone
    data:
      push:
        sound:
          name: default
          critical: 1
          volume: 1.0

  sump_current_spike:
    name: "Sump current spike"
    entity_id: binary_sensor.sump_current_spike_alert
    state: "on"
    repeat: [60]
    can_acknowledge: true
    skip_first: false
    title: "Sump current spike"
    message: >
      Sump peak current {{ states('sensor.sump_run_peak_current') }} A exceeded the spike cutoff (possible jam).
    notifiers:
      - gregs_iphone

  sump_high_duty_cycle:
    name: "Sump high duty cycle"
    entity_id: binary_sensor.sump_high_duty_cycle_alert
    state: "on"
    repeat: [120]
    can_acknowledge: true
    skip_first: false
    title: "Sump high duty cycle"
    message: >
      Sump duty cycle {{ states('sensor.sump_duty_cycle_24h') }}% over 24h — losing the battle.
    notifiers:
      - gregs_iphone

# NOTE: sump High Frequency alert intentionally omitted (toggle OFF / superseded
# by short_interval). binary_sensor.sump_high_frequency exists for the dashboard.
# PHASE 2 SEAM: a rain-normalized daily-count alert plugs in here.
# ROADMAP: binary_sensor.sump_high_water (in-pit float, early warning) becomes the
# top CRITICAL alert above flooding; binary_sensor.sump_backup_running CRITICAL.
